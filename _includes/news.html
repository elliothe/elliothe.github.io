<div class="home-side-panel news-panel">
    <p class="home-kicker">Latest</p>
    <h4>News</h4>

    {% for article in site.data.latest_news limit: 5 %}
    <article class="home-news-item">
        <time>{{ article.date }}</time>
        <p>{{ article.title }}</p>
    </article>
    {% endfor %}

    <a class="home-text-link" href="{{ '/news.html' | relative_url }}">All news</a>
</div>
